<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <style>
    @page { size: A4 portrait; margin: 16mm; }
    body {
      margin: 0;
      color: #111;
      font-family: KoreanDocumentFont, sans-serif;
      font-size: 10.5pt;
      line-height: 1.55;
    }
    h1 {
      margin: 0 0 8mm;
      text-align: center;
      font-size: 21pt;
      font-weight: 700;
    }
    h2 {
      margin: 7mm 0 2mm;
      padding-bottom: 2mm;
      border-bottom: 1.5px solid #222;
      font-size: 13pt;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th,
    td {
      border: 1px solid #555;
      padding: 2.5mm 3mm;
      vertical-align: top;
    }
    th {
      width: 23%;
      background: #f3f3f3;
      text-align: left;
      font-weight: 700;
    }
    td {
      white-space: pre-line;
      overflow-wrap: break-word;
    }
    .long {
      min-height: 17mm;
    }
    .signature-table th {
      width: 22%;
      text-align: center;
    }
    .signature-cell {
      height: 19mm;
      text-align: right;
      vertical-align: bottom;
    }
    .date-spacer {
      display: inline-block;
      width: 12mm;
    }
    .notice {
      margin-top: 5mm;
      color: #555;
      font-size: 9pt;
    }
    .generated {
      margin-top: 6mm;
      color: #555;
      text-align: right;
      font-size: 9pt;
    }
  </style>
</head>
<body>
  <h1>개별연구 신청서</h1>

  <h2>1. 신청자 정보</h2>
  <table>
    <tr>
      <th>성명</th>
      <td th:text="${application.studentName}"></td>
      <th>학번</th>
      <td th:text="${application.studentLoginId}"></td>
    </tr>
    <tr>
      <th>소속</th>
      <td th:text="${application.studentDepartment}"></td>
      <th>연락처</th>
      <td th:text="${contact}"></td>
    </tr>
    <tr>
      <th>이메일</th>
      <td colspan="3" th:text="${application.studentEmail}"></td>
    </tr>
  </table>

  <h2>2. 신청 과목 및 연구 정보</h2>
  <table>
    <tr>
      <th>학년도/학기</th>
      <td th:text="${application.semester}"></td>
      <th>담당교수</th>
      <td th:text="${application.professorName}"></td>
    </tr>
    <tr>
      <th>교과목명</th>
      <td colspan="3" th:text="${application.courseName}"></td>
    </tr>
    <tr>
      <th>연구주제</th>
      <td colspan="3" th:text="${researchTitle}"></td>
    </tr>
    <tr>
      <th>연구내용</th>
      <td colspan="3" class="long" th:text="${application.researchDescription}"></td>
    </tr>
  </table>

  <h2>3. 신청 내용</h2>
  <table>
    <tr>
      <th>신청사유</th>
      <td class="long" th:text="${application.applicationReason}"></td>
    </tr>
    <tr>
      <th>연구목적</th>
      <td class="long" th:text="${application.researchPurpose}"></td>
    </tr>
  </table>

  <h2>4. 담당교수 확인</h2>
  <table class="signature-table">
    <tr>
      <th>확인일자</th>
      <td class="signature-cell">년<span class="date-spacer"></span>월<span class="date-spacer"></span>일</td>
    </tr>
    <tr>
      <th>담당교수 서명</th>
      <td class="signature-cell">(서명 또는 인)</td>
    </tr>
  </table>

  <p class="notice">
    본 문서는 학생이 입력한 신청자 정보와 신청 내용을 바탕으로 생성된 확인용 신청서입니다.
    담당교수 확인 및 서명 후 제출 파일로 사용할 수 있습니다.
  </p>
  <p class="generated">생성일시: <span th:text="${generatedAt}"></span></p>
</body>
</html>
